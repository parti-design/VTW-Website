---
layout: default
---

<div class="page-wrapper">
  <div class="container">

    <header class="page-header">
      {%- if page.title -%}
        <h1 class="page-title">{{ page.title }}</h1>
      {%- endif -%}
      {%- if page.subtitle -%}
        <p class="page-subtitle">{{ page.subtitle }}</p>
      {%- endif -%}
    </header>

    <div class="page-content">
      {{ content }}
    </div>

  </div>
</div>
