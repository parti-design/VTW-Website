---
layout: default
---

<div class="page-wrapper">
  <div class="container">
    <div class="contact-simple">

      <header class="page-header">
        <h1 class="page-title">{{ page.title }}</h1>
      </header>

      <div class="contact-simple__body">
        {{ content }}
      </div>

      <div class="contact-simple__details">
        {%- if page.phone and page.phone != "" -%}
        <div class="contact-detail">
          <span class="contact-detail__label">Phone</span>
          <a class="contact-detail__value" href="tel:{{ page.phone | remove: ' ' | remove: '-' | remove: '(' | remove: ')' }}">{{ page.phone }}</a>
        </div>
        {%- endif -%}
        {%- if page.email and page.email != "" -%}
        <div class="contact-detail">
          <span class="contact-detail__label">Email</span>
          <a class="contact-detail__value" href="mailto:{{ page.email }}">{{ page.email }}</a>
        </div>
        {%- endif -%}
        <div class="contact-detail">
          <span class="contact-detail__label">Based in</span>
          <span class="contact-detail__value">Hudson Valley, NY</span>
        </div>
      </div>

    </div>
  </div>
</div>
