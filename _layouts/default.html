<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }} | {{ site.title }}</title>

  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/assets/css/home.css' | relative_url }}" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />

  {%- seo -%}
</head>
<body class="page-interior">

  <header class="hn" id="hn">
    <div class="hn__inner">
      <a class="hn__logo" href="{{ '/' | relative_url }}">Severin Winter</a>
      <nav class="hn__nav" aria-label="Main navigation">
        <ul class="hn__list">
          {%- for link in site.nav_links -%}
            {%- unless link.title == "Home" -%}
            <li>
              <a class="hn__link{% if page.url == link.url %} hn__link--active{% endif %}" href="{{ link.url | relative_url }}">{{ link.title }}</a>
            </li>
            {%- endunless -%}
          {%- endfor -%}
        </ul>
      </nav>
    </div>
  </header>

  <main class="im" id="main-content">
    {{ content }}
  </main>

  <footer class="hft">
    <div class="hft__inner">
      <p class="hft__copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author.name | default: site.title }}. Hudson Valley, NY.</p>
      <a class="hft__admin" href="{{ '/admin/' | relative_url }}">Admin</a>
    </div>
  </footer>

  <script>
    const nav = document.getElementById('hn');
    if (nav) {
      const syncNav = () => {
        nav.classList.toggle('hn--scrolled', window.scrollY > 80);
      };
      syncNav();
      window.addEventListener('scroll', syncNav, { passive: true });
    }
  </script>

</body>
</html>
