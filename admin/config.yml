backend:
  name: github
  repo: parti-design/VTW-Website
  branch: main

# Media library — images uploaded via CMS land here
media_folder: assets/images
public_folder: /assets/images

# Site URL for live preview links in the CMS
# site_url: https://your-domain.com

collections:

  # ---- Pages ---------------------------------------------------------------
  - name: pages
    label: Pages
    label_singular: Page
    files:

      - label: Home
        name: home
        file: index.md
        fields:
          - { label: Layout,          name: layout,          widget: hidden, default: home }
          - { label: Title,           name: title,           widget: string }
          - { label: Hero Label,      name: hero_label,      widget: string,   required: false }
          - { label: Hero Heading,    name: hero_heading,    widget: string,   required: false }
          - { label: Hero Subheading, name: hero_subheading, widget: text,     required: false }
          - { label: Hero Image,      name: hero_image,      widget: image,    required: false }
          - { label: Hero CTA Text,   name: hero_cta_text,   widget: string,   required: false }
          - { label: Statement Text,  name: statement_text,  widget: text,     required: false }
          - { label: Statement Aside, name: statement_aside, widget: string,   required: false }
          - { label: Statement Image, name: statement_image, widget: image,    required: false }
          - { label: Advocate Label,  name: advocate_label,  widget: string,   required: false }
          - { label: Advocate Quote,  name: advocate_quote,  widget: text,     required: false }
          - { label: Advocate Name,   name: advocate_name,   widget: string,   required: false }
          - { label: Advocate Context, name: advocate_context, widget: text,   required: false }
          - { label: Advocate Image,  name: advocate_image,  widget: image,    required: false }
          - { label: Footer CTA Heading, name: home_cta_heading, widget: text, required: false }
          - { label: Footer CTA Subheading, name: home_cta_sub, widget: text,  required: false }
          - { label: Footer CTA Link Text, name: home_cta_link_text, widget: string, required: false }
          - { label: Body,            name: body,            widget: markdown }

      - label: About
        name: about
        file: _pages/about.md
        fields:
          - { label: Layout,      name: layout,      widget: hidden, default: page }
          - { label: Title,       name: title,       widget: string }
          - { label: Permalink,   name: permalink,   widget: hidden, default: /about/ }
          - { label: Description, name: description, widget: text,   required: false }
          - { label: Body,        name: body,        widget: markdown }

      - label: Services
        name: services
        file: _pages/services.md
        fields:
          - { label: Layout,      name: layout,      widget: hidden, default: page }
          - { label: Title,       name: title,       widget: string }
          - { label: Permalink,   name: permalink,   widget: hidden, default: /services/ }
          - { label: Description, name: description, widget: text,   required: false }
          - { label: Body,        name: body,        widget: markdown }

      - label: FAQ
        name: faq
        file: _pages/faq.md
        fields:
          - { label: Layout,      name: layout,      widget: hidden, default: page }
          - { label: Title,       name: title,       widget: string }
          - { label: Permalink,   name: permalink,   widget: hidden, default: /faq/ }
          - { label: Description, name: description, widget: text,   required: false }
          - { label: Body,        name: body,        widget: markdown }

      - label: Contact
        name: contact
        file: _pages/contact.md
        fields:
          - { label: Layout,      name: layout,      widget: hidden, default: contact }
          - { label: Title,       name: title,       widget: string }
          - { label: Permalink,   name: permalink,   widget: hidden, default: /contact/ }
          - { label: Phone Area Code, name: phone_area, widget: string, required: false, hint: "First 3 digits" }
          - { label: Phone Prefix, name: phone_prefix, widget: string, required: false, hint: "Middle 3 digits" }
          - { label: Phone Line Number, name: phone_line, widget: string, required: false, hint: "Last 4 digits" }
          - { label: Email User,  name: email_user,  widget: string, required: false, hint: "Text before the @ sign" }
          - { label: Email Domain, name: email_domain, widget: string, required: false, hint: "Text after the @ sign" }
          - { label: Description, name: description, widget: text,   required: false }
          - { label: Body,        name: body,        widget: markdown }

  # ---- Projects ------------------------------------------------------------
  - name: projects
    label: Projects
    label_singular: Project
    folder: _projects
    create: true
    slug: "{{slug}}"
    preview_path: "projects/{{slug}}/"
    fields:
      - { label: Title,       name: title,       widget: string }
      - { label: Type,        name: type,        widget: select, options: ["New Construction", "Renovation", "Historical Restoration"] }
      - { label: Cover Image, name: cover_image, widget: image, required: false }
      - label: Gallery
        name: gallery
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - { label: Description, name: description, widget: text,   required: false }
      - { label: Featured,    name: featured,    widget: boolean, default: false, hint: "Show on homepage" }
      - { label: Year,        name: year,        widget: number, required: false }
      - { label: Location,    name: location,    widget: string, required: false }
      - { label: Body,        name: body,        widget: markdown, required: false }

  # ---- Posts / Articles ----------------------------------------------------
  - name: posts
    label: Articles
    label_singular: Article
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "{{year}}/{{month}}/{{day}}/{{slug}}/"
    fields:
      - { label: Layout,      name: layout,      widget: hidden, default: post }
      - { label: Title,       name: title,       widget: string }
      - { label: Date,        name: date,        widget: datetime }
      - { label: Author,      name: author,      widget: string,   required: false, default: "Severin Winter" }
      - { label: Description, name: description, widget: text,     required: false }
      - { label: Body,        name: body,        widget: markdown }

  # ---- Testimonials --------------------------------------------------------
  - name: testimonials
    label: Testimonials
    label_singular: Testimonial
    files:
      - label: Testimonials
        name: testimonials
        file: _data/testimonials.yml
        fields:
          - label: Testimonials
            name: testimonials
            widget: list
            fields:
              - { label: Quote,   name: quote,   widget: text }
              - { label: Name,    name: name,    widget: string }
              - { label: Project, name: project, widget: string, required: false }
              - { label: Feature on homepage, name: featured, widget: boolean, default: false }
