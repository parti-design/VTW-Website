<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Von Trapp Winter logo</title>
  <desc id="desc">A simplified tree icon above the words Von Trapp Winter.</desc>
  <defs>
    <style>
      .mark {
        fill: none;
        stroke: #2c2419;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 6;
      }
      .accent {
        stroke: #b8a07a;
