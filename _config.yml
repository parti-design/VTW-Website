title: "Severin Winter Consulting"
description: >-
  Building consultant specializing in new construction, renovation, and
  restoration of historical barns and houses in the Hudson Valley, NY.
url: "https://vontrappwinter.com"
baseurl: ""

author:
  name: Severin Winter

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Permalink style
permalink: /:year/:month/:day/:title/

# Include non-standard directories
include:
  - _pages

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - README.md
  - agents.md

# Collections
collections:
  wiki:
    output: true
    permalink: /wiki/:name/
  projects:
    output: true
    permalink: /projects/:slug/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "_wiki"
      type: "wiki"
    values:
      layout: "page"
  - scope:
      path: "_projects"
      type: "projects"
    values:
      layout: "project"

# Navigation
nav_links:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Services
    url: /services/
  - title: Projects
    url: /projects/
  - title: Articles
    url: /articles/
  - title: FAQ
    url: /faq/
  - title: Contact
    url: /contact/
